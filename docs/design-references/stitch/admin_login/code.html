<div class="w-full max-w-md flex flex-col items-center">
<!-- Logo Area -->
<div class="mb-8 text-center flex flex-col items-center">
<img alt="SIGAP Banjir Logo" class="h-16 w-auto mb-4 object-contain" data-alt="A clean, minimalist government agency logo featuring geometric shapes in dark navy blue and white, representing water management and civic authority, isolated on a clean background." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBb7KJ3kWs9omHkC-lPGkY9eLsyAnW6Fi6er_ndG23HbNjzvoNQGj3exwiqeEofXvVMBV-6gh8jtKTwqqP6lLE_FCrxGGnKDgLr25Qea9WpsLgwGC_UOddVvLFmGfKTOTk0-BNmTpsJF9FqwZNQzZWQAmZX_exE_Im4YO-T3vkqEp5p_kQV32ZBrnF4DZJJ4jr12n8UCEzT8vgOZDnfksmPO-wuEwFtDE8mOMxDwSvfNqH-d2ggjMpOWJtoItmxDwJlBLPPsofN6z4"/>
<h1 class="font-headline-md text-headline-md text-primary">SIGAP Banjir</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Portal Manajemen Data Spasial</p>
</div>
<!-- Login Card -->
<div class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm p-8">
<form action="#" class="space-y-5" method="POST">
<!-- Username Field -->
<div>
<label class="block font-body-sm text-body-sm text-on-surface-variant mb-1.5" for="username">
                        Username / NIP
                    </label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[18px]">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 bg-surface border border-outline-variant rounded-radius-base text-on-surface font-body-md text-body-md placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="username" name="username" placeholder="e.g. adm_12345" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex items-center justify-between mb-1.5">
<label class="block font-body-sm text-body-sm text-on-surface-variant" for="password">
                            Password
                        </label>
<a class="font-body-sm text-body-sm text-secondary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[18px]">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 bg-surface border border-outline-variant rounded-radius-base text-on-surface font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="password" name="password" required="" type="password"/>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full flex justify-center items-center gap-2 bg-primary text-on-primary font-body-md text-body-md font-medium rounded-radius-base py-3 px-4 hover:bg-primary-container transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary" type="submit">
<span>Secure Login</span>
<span class="material-symbols-outlined text-[18px]">login</span>
</button>
</div>
</form>
</div>
<!-- Footer Info -->
<div class="mt-8 text-center font-body-sm text-body-sm text-outline">
